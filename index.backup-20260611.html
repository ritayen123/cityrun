<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FROST RUN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#2A5068;font-family:'Fredoka',sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}

#menu{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(0,0,0,0) 20%,rgba(0,0,0,.5));pointer-events:auto;cursor:pointer;gap:10px;transition:opacity .3s}
#menu.hide{opacity:0;pointer-events:none}
#menu h1{font-size:clamp(52px,14vw,110px);font-weight:700;color:#fff;text-shadow:0 3px 0 #E8584F,0 6px 0 #C44840,0 10px 30px rgba(0,0,0,.5);letter-spacing:6px;animation:bob 2.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.sub{font-size:clamp(12px,2.5vw,16px);color:rgba(255,255,255,.45);letter-spacing:4px;text-transform:uppercase}
#mbest{color:#FFD700;font-weight:600;font-size:clamp(13px,2.5vw,17px);min-height:20px;margin-top:4px}
.tap{font-size:clamp(15px,3.5vw,22px);color:rgba(255,255,255,.85);font-weight:600;margin-top:32px;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.keys{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.keys span{font-size:11px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);padding:3px 10px;border-radius:6px}

#hud{position:absolute;top:0;left:0;width:100%;display:none;padding:12px 16px 0;justify-content:space-between;align-items:flex-start}
#hud.on{display:flex}
.hi{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:5px 14px;border-radius:20px;color:#fff;font-size:clamp(14px,3vw,18px);font-weight:600;margin-bottom:4px}
.hi.sc{background:rgba(232,88,79,.5)}.hi.co{background:rgba(255,200,60,.35)}
#pup{position:absolute;top:60px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
.pb{background:rgba(0,0,0,.5);backdrop-filter:blur(6px);color:#fff;padding:3px 10px;border-radius:14px;font-size:13px;font-weight:600;border:2px solid #4488FF}

#go{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,15,30,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);pointer-events:auto;gap:12px}
#go.on{display:flex;animation:fi .5s ease-out}
@keyframes fi{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
#go h2{font-size:clamp(38px,10vw,68px);font-weight:700;color:#E8584F;text-shadow:0 4px 20px rgba(232,88,79,.4);letter-spacing:4px}
#nb{display:none;color:#FFD700;font-weight:700;font-size:clamp(14px,3vw,18px);animation:nbp .7s ease-in-out infinite;text-shadow:0 0 12px rgba(255,215,0,.4)}
@keyframes nbp{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.card{background:rgba(255,255,255,.07);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px 36px;display:flex;flex-direction:column;gap:10px;min-width:210px}
.rr{display:flex;justify-content:space-between;font-size:clamp(15px,3.5vw,19px);color:rgba(255,255,255,.6)}.rr .v{font-weight:700;color:#fff}.rr.best .v{color:#FFD700}
.br{display:flex;gap:12px;margin-top:10px}
.btn{font-family:'Fredoka',sans-serif;font-size:clamp(15px,3.5vw,19px);font-weight:700;border:none;border-radius:14px;padding:13px 34px;cursor:pointer;transition:transform .12s;letter-spacing:1px}
.btn:active{transform:scale(.93)}
.bp{background:linear-gradient(135deg,#E8584F,#F0976E);color:#fff;box-shadow:0 6px 20px rgba(232,88,79,.35)}
.bs{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}
#sound-btn{position:fixed;top:12px;right:14px;z-index:20;background:rgba(0,0,0,.3);backdrop-filter:blur(6px);border:none;color:#fff;font-size:18px;width:38px;height:38px;border-radius:50%;cursor:pointer;pointer-events:auto}
#err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#1a1a2e;z-index:999;color:#E8584F;font-size:14px;padding:20px;text-align:center}
@media(max-width:600px){.keys{display:none}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button id="sound-btn">🔊</button>
  <div id="menu">
    <h1>FROST RUN</h1>
    <p class="sub">Endless Runner</p>
    <div id="mbest"></div>
    <p class="tap">TAP TO START</p>
    <div class="keys"><span>← → 換道</span><span>↑ 跳躍</span><span>↓ 滑行</span></div>
  </div>
  <div id="hud">
    <div><div class="hi sc">❄ <span id="sv">0</span></div><div class="hi co">💰 <span id="cv">0</span></div></div>
    <div><div class="hi"><span id="dv">0m</span></div></div>
    <div id="pup"></div>
  </div>
  <div id="go">
    <h2>GAME OVER</h2>
    <div id="nb">NEW BEST!</div>
    <div class="card">
      <div class="rr"><span>Score</span><span class="v" id="fs">0</span></div>
      <div class="rr"><span>Coins</span><span class="v" id="fc">0</span></div>
      <div class="rr"><span>Distance</span><span class="v" id="fd">0m</span></div>
      <div class="rr best"><span>Best</span><span class="v" id="fb">0</span></div>
    </div>
    <div class="br">
      <button class="btn bp" id="retry">RETRY</button>
      <button class="btn bs" id="menub">MENU</button>
    </div>
  </div>
</div>
<div id="err"></div>
<script>window.onerror=function(m,u,l){document.getElementById('err').style.display='flex';document.getElementById('err').textContent='Error: '+m+' (line '+l+')'}</script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
<script>
try{(function(){
"use strict";

// ── CONSTANTS ──
var LW=3.2, SL=50, NS=6, GY=0.9, TZ=18;
var JF=14, GR=38, SD=0.6, LS=14;
var BS=25, SI=2.2, MS=75, PT=6;
var P2=Math.PI*2, HP=Math.PI/2;

// ── PALETTE — Arctic Ice World (warm accents) ──
var FOG_COL=0x2A5068;
var ROAD_COL=0x3899BB;
var SIDE_COL=0xB8D8EC;
var CURB_COL=0x55BBDD;
var LINE_COL=0xAAEEFF;
var GND_COL=0x3A7898;
var WARM1=0xFFAA55;  // amber lamp glow
var WARM2=0xFF8844;  // warm rock accent
var WARM3=0xCC6633;  // rusty metal
var CC=[0xDD3333,0x8844CC,0x22AA88,0xDD8822,0x3366CC,0xBB2266,0x2288DD];

function rF(a,b){return Math.random()*(b-a)+a}
function rI(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function rC(a){return a[Math.floor(Math.random()*a.length)]}
function lp(a,b,t){return a+(b-a)*Math.min(t,1)}

// Direction helpers: angle 0 = +Z; right vector points screen-right (accounts for RH coords)
function fwX(a){return -Math.sin(a)}
function fwZ(a){return Math.cos(a)}
function riX(a){return -Math.cos(a)}
function riZ(a){return -Math.sin(a)}

// ── AUDIO ──
var actx=null,muted=false;
function aInit(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function aRes(){if(actx&&actx.state==='suspended')actx.resume()}
function aT(f,d,ty,v,fe){if(!actx||muted)return;var o=actx.createOscillator(),g=actx.createGain();o.type=ty||'sine';o.frequency.setValueAtTime(f,actx.currentTime);if(fe)o.frequency.exponentialRampToValueAtTime(fe,actx.currentTime+d);g.gain.setValueAtTime(v||.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+d)}
function sCoin(){aT(1200,.06);setTimeout(function(){aT(1600,.06)},40)}
function sJump(){aT(300,.12,'sine',.06,600)}
function sSlide(){aT(200,.1,'sawtooth',.03,100)}
function sCrash(){if(!actx||muted)return;var n=actx.sampleRate*.2,b=actx.createBuffer(1,n,actx.sampleRate),d=b.getChannelData(0);for(var i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);var s=actx.createBufferSource();s.buffer=b;var g=actx.createGain();g.gain.setValueAtTime(.12,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.2);s.connect(g).connect(actx.destination);s.start()}
function sPU(){aT(500,.05);setTimeout(function(){aT(700,.05)},40);setTimeout(function(){aT(900,.07)},80)}
function sTurn(){aT(400,.08,'sine',.05,800);setTimeout(function(){aT(600,.06,'sine',.04)},50)}
function sSwoosh(){aT(180,.08,'sine',.03,90)}
function sBoost(){aT(200,.15,'sawtooth',.06,800);setTimeout(function(){aT(400,.1,'sine',.05,1200)},60)}
function sFreeze(){aT(800,.15,'sine',.04,200);setTimeout(function(){aT(600,.12,'sine',.03,150)},70)}

// ── RENDERER ──
var cv=document.getElementById('c'),W=innerWidth,H=innerHeight;
var ren=new THREE.WebGLRenderer({canvas:cv,antialias:true,failIfMajorPerformanceCaveat:false,powerPreference:'default'});
ren.setSize(W,H);ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.shadowMap.enabled=true;ren.shadowMap.type=THREE.PCFSoftShadowMap;
ren.toneMapping=THREE.ACESFilmicToneMapping;ren.toneMappingExposure=1.2;
ren.outputEncoding=THREE.sRGBEncoding;

var sc=new THREE.Scene();
sc.background=new THREE.Color(FOG_COL);
sc.fog=new THREE.Fog(FOG_COL,30,110);

// ── PAINTED PANORAMA (hand-painted Arctic backdrop) ──
function paintPano(){
  var CW=2048,CH=1024,c2=document.createElement('canvas');c2.width=CW;c2.height=CH;
  var K=c2.getContext('2d');
  var _s=42;function R(){_s=(_s*16807)%2147483647;return(_s&0x7FFFFFFF)/2147483647}

  var gd=K.createLinearGradient(0,0,0,CH);
  gd.addColorStop(0,'#020510');gd.addColorStop(0.12,'#050D1C');
  gd.addColorStop(0.28,'#0C2035');gd.addColorStop(0.42,'#1A3C52');
  gd.addColorStop(0.55,'#2C5C70');gd.addColorStop(0.66,'#3A6E82');
  gd.addColorStop(0.78,'#34606E');gd.addColorStop(0.9,'#2E5568');gd.addColorStop(1,'#2A5068');
  K.fillStyle=gd;K.fillRect(0,0,CW,CH);

  for(var i=0;i<350;i++){
    var sx=R()*CW,sy=R()*CH*0.5,ss=R()*1.6+0.3;
    K.fillStyle='rgba(255,255,255,'+(0.2+R()*0.8)+')';
    K.beginPath();K.arc(sx,sy,ss,0,Math.PI*2);K.fill();
    if(R()>0.92){K.strokeStyle='rgba(200,230,255,0.12)';K.lineWidth=0.5;
      K.beginPath();K.moveTo(sx-4,sy);K.lineTo(sx+4,sy);K.stroke();
      K.beginPath();K.moveTo(sx,sy-4);K.lineTo(sx,sy+4);K.stroke()}
  }

  K.fillStyle='rgba(220,235,245,0.85)';K.beginPath();K.arc(CW*.78,CH*.17,20,0,Math.PI*2);K.fill();
  K.fillStyle='rgba(200,225,240,0.06)';K.beginPath();K.arc(CW*.78,CH*.17,45,0,Math.PI*2);K.fill();
  K.fillStyle='rgba(180,215,235,0.03)';K.beginPath();K.arc(CW*.78,CH*.17,70,0,Math.PI*2);K.fill();

  K.save();K.globalCompositeOperation='lighter';
  for(var a=0;a<6;a++){var ay=CH*0.09+a*28;
    for(var pass=0;pass<3;pass++){K.beginPath();
      for(var px=0;px<=CW;px+=4){
        var yy=ay+Math.sin(px*0.005+a*2.1)*38+Math.sin(px*0.013+a*0.6)*18+Math.sin(px*0.028+a*1.3)*8;
        if(px===0)K.moveTo(px,yy+pass*4);else K.lineTo(px,yy+pass*4)}
      K.strokeStyle='rgba('+(a%2===0?'34,255,136':'130,80,255')+','+(0.05-pass*0.015)+')';
      K.lineWidth=20-pass*5;K.stroke()}}
  K.restore();

  function mP(px,c){var y=0;for(var i=0;i<c.length;i++)y+=Math.sin(px/CW*Math.PI*2*c[i][0]+c[i][1])*c[i][2];return Math.max(y,0)}
  function mts(baseY,col,c,sA){
    K.fillStyle=col;K.beginPath();K.moveTo(0,CH);
    for(var px=0;px<=CW;px+=2)K.lineTo(px,baseY-mP(px,c));
    K.lineTo(CW,CH);K.closePath();K.fill();
    if(sA>0){K.fillStyle='rgba(215,235,245,'+sA+')';
      for(var px=4;px<CW-4;px+=4){var y0=mP(px,c),yL=mP(px-4,c),yR=mP(px+4,c);
        if(y0>yL&&y0>yR&&y0>18){var sw=8+y0*0.3;
          K.beginPath();K.moveTo(px-sw,baseY-y0+y0*0.12+3);
          K.quadraticCurveTo(px,baseY-y0-2,px+sw,baseY-y0+y0*0.12+3);K.closePath();K.fill()}}}
  }

  mts(CH*0.51,'#071822',[[3,.5,24],[5,1.2,18],[7,2.3,11],[2,.8,30],[11,3.1,7]],0);
  mts(CH*0.57,'#0F2A3A',[[2,3.4,32],[4,.7,24],[6,2.1,14],[9,1.5,9],[3,4.2,20]],0.2);
  mts(CH*0.64,'#1A4050',[[3,1.1,34],[5,3.8,22],[2,2.4,28],[7,.3,15],[4,5.1,18]],0.45);
  var nrC=[[2,.9,24],[4,2.6,18],[6,4.2,11],[3,1.7,22],[8,3.3,7]];
  mts(CH*0.72,'#24586A',nrC,0.6);

  var tCols=['#0C2A28','#0E3030','#103428','#0A2822','#122E2E'];
  for(var i=0;i<80;i++){var tx=R()*CW;
    var tBase=CH*0.72-mP(tx,nrC);if(tBase>CH*0.74)continue;
    var tH=5+R()*15,tW=tH*0.28;
    K.fillStyle=tCols[Math.floor(R()*tCols.length)];
    K.beginPath();K.moveTo(tx,tBase-tH);K.lineTo(tx-tW,tBase);K.lineTo(tx+tW,tBase);K.closePath();K.fill();
    if(R()>0.3){K.fillStyle='rgba(200,225,240,'+(0.25+R()*0.3)+')';
      K.beginPath();K.moveTo(tx,tBase-tH);K.lineTo(tx-tW*0.4,tBase-tH*0.5);K.lineTo(tx+tW*0.4,tBase-tH*0.5);K.closePath();K.fill()}
    if(R()>0.5){var tH2=tH*0.65,tW2=tW*1.1;
      K.fillStyle=tCols[Math.floor(R()*tCols.length)];
      K.beginPath();K.moveTo(tx,tBase-tH2-tH*0.2);K.lineTo(tx-tW2,tBase-tH*0.2);K.lineTo(tx+tW2,tBase-tH*0.2);K.closePath();K.fill()}
  }

  K.fillStyle='rgba(140,190,210,0.15)';
  for(var i=0;i<15;i++){var dx=R()*CW,dy=CH*0.78+R()*CH*0.1,dw=60+R()*120;
    K.beginPath();K.ellipse(dx,dy,dw,4+R()*6,0,0,Math.PI*2);K.fill()}
  return c2;
}

var skyGeo=new THREE.SphereGeometry(120,32,24);
var skyTex=new THREE.CanvasTexture(paintPano());
var skyMat=new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide,fog:false});
var skyMsh=new THREE.Mesh(skyGeo,skyMat);sc.add(skyMsh);

var cam=new THREE.PerspectiveCamera(60,W/H,.1,200);
cam.position.set(0,7,-10);cam.lookAt(0,2,20);

// Lights — Arctic moonlight + aurora glow
var hemi=new THREE.HemisphereLight(0x4488AA,0xDDEEFF,.65);sc.add(hemi);
sc.add(new THREE.AmbientLight(0xCCDDEE,.35));
var dL=new THREE.DirectionalLight(0xCCDDFF,1.3);
dL.position.set(-6,18,8);dL.castShadow=true;
dL.shadow.mapSize.set(1024,1024);dL.shadow.camera.near=1;dL.shadow.camera.far=50;
dL.shadow.camera.left=-14;dL.shadow.camera.right=14;dL.shadow.camera.top=14;dL.shadow.camera.bottom=-14;
dL.shadow.bias=-.001;sc.add(dL);
var bL=new THREE.DirectionalLight(0x44FF88,.25);bL.position.set(4,10,-6);sc.add(bL);
var pL=new THREE.DirectionalLight(0x8866CC,.15);pL.position.set(-8,6,4);sc.add(pL);

// Ground — procedural snow texture
var gndCv=document.createElement('canvas');gndCv.width=512;gndCv.height=512;
var gK=gndCv.getContext('2d');
gK.fillStyle='#3A7898';gK.fillRect(0,0,512,512);
// Snow patches
var _gs=77;function gR(){_gs=(_gs*16807)%2147483647;return(_gs&0x7FFFFFFF)/2147483647}
for(var gi=0;gi<60;gi++){
  var gx=gR()*512,gy=gR()*512,gr=20+gR()*60;
  gK.fillStyle='rgba(200,225,240,'+(0.08+gR()*0.15)+')';
  gK.beginPath();gK.ellipse(gx,gy,gr,gr*(.5+gR()*.5),gR()*Math.PI,0,Math.PI*2);gK.fill();
}
// Ice cracks on ground
gK.strokeStyle='rgba(100,180,210,0.12)';gK.lineWidth=1;
for(var gi=0;gi<25;gi++){
  var cx=gR()*512,cy=gR()*512;gK.beginPath();gK.moveTo(cx,cy);
  for(var gj=0;gj<4;gj++){cx+=gR()*40-20;cy+=gR()*40-20;gK.lineTo(cx,cy)}gK.stroke();
}
// Subtle warm rock spots (break monotone blue)
for(var gi=0;gi<12;gi++){
  gK.fillStyle='rgba(140,100,70,'+(0.04+gR()*0.06)+')';
  var gx2=gR()*512,gy2=gR()*512;
  gK.beginPath();gK.ellipse(gx2,gy2,10+gR()*25,8+gR()*20,gR()*Math.PI,0,Math.PI*2);gK.fill();
}
var gndTex=new THREE.CanvasTexture(gndCv);gndTex.wrapS=gndTex.wrapT=THREE.RepeatWrapping;gndTex.repeat.set(8,8);
var gnd=new THREE.Mesh(new THREE.PlaneGeometry(300,300),new THREE.MeshPhongMaterial({map:gndTex,color:0xFFFFFF,shininess:40,specular:0x446688}));
gnd.rotation.x=-Math.PI/2;gnd.position.set(0,-.06,0);gnd.receiveShadow=true;sc.add(gnd);

window.addEventListener('resize',function(){W=innerWidth;H=innerHeight;cam.aspect=W/H;cam.updateProjectionMatrix();ren.setSize(W,H)});

// ── MATERIALS — Ice World ──
var mr=new THREE.MeshPhongMaterial({color:ROAD_COL,shininess:120,specular:0x88CCDD});
var ms=new THREE.MeshPhongMaterial({color:SIDE_COL,shininess:8});
var mc=new THREE.MeshPhongMaterial({color:CURB_COL,shininess:60});
var ml=new THREE.MeshBasicMaterial({color:LINE_COL});
var mco=new THREE.MeshPhongMaterial({color:0xFFD700,shininess:90,emissive:0xFFAA00,emissiveIntensity:.35});
var mwh=new THREE.MeshPhongMaterial({color:0x1A2A3A});
var mgl=new THREE.MeshPhongMaterial({color:0x55BBEE,transparent:true,opacity:.45,shininess:120,specular:0xFFFFFF});
var mpole=new THREE.MeshPhongMaterial({color:0x44AACC,transparent:true,opacity:.8,shininess:100,specular:0xAADDFF});
var mice=new THREE.MeshPhongMaterial({color:0x44BBDD,transparent:true,opacity:.65,shininess:140,specular:0xFFFFFF});
var msnow=new THREE.MeshPhongMaterial({color:0xE0EEF5,shininess:10});

var cmC={};function cM(c){if(!cmC[c])cmC[c]=new THREE.MeshPhongMaterial({color:c,shininess:50});return cmC[c]}

// ── CHARACTER — Penguin (Adventure Time style) ──
var pl=new THREE.Group();
var pLn=0,pJ=false,pS=false,pVY=0,pST=0,pAl=true,pRT=0,pDead=false,pDeadT=0;
var curLO=0; // current lane offset (smooth)

// Body
var bdG=new THREE.SphereGeometry(.55,14,14);bdG.scale(1,1.35,.85);
var pBody=new THREE.Mesh(bdG,new THREE.MeshPhongMaterial({color:0x1A1A2E,shininess:20}));
pBody.position.y=.72;pBody.castShadow=true;pl.add(pBody);

// Belly
var blG=new THREE.SphereGeometry(.38,10,10);blG.scale(.85,1.15,.5);
var pBelly=new THREE.Mesh(blG,new THREE.MeshPhongMaterial({color:0xF5F5F5,shininess:15}));
pBelly.position.set(0,.68,.24);pl.add(pBelly);

// Eyes
var eyeW=new THREE.MeshPhongMaterial({color:0xFFFFFF,shininess:50});

function pReset(){
  pLn=0;curLO=0;pJ=false;pS=false;pVY=0;pST=0;pAl=true;pRT=0;pDead=false;pDeadT=0;
  pl.position.set(0,GY,0);pl.scale.set(1,1,1);pl.rotation.set(0,0,0);pl.visible=true;
  pBody.rotation.set(0,0,0);fL.rotation.set(0,0,0);fR.rotation.set(0,0,0);
  ftL.position.set(-.18,-.02,.06);ftL.rotation.x=0;
  ftR.position.set(.18,-.02,.06);ftR.rotation.x=0;
  pBody.material.emissive.setHex(0x000000);pBody.material.emissiveIntensity=0;
  bstVis.material.opacity=0;
}

function pDieAnim(dt){
  pDeadT+=dt;
  // Tumble backward + spin
  pl.rotation.x-=dt*4;
  pl.rotation.z+=dt*2;
  // Fly up then fall
  if(pDeadT<.25) pl.position.y+=dt*6;
  else pl.position.y-=dt*8;
  // Shrink slightly
  var s=Math.max(0.3,1-pDeadT*.6);
  pl.scale.set(s,s,s);
}

function pAnimate(dt,spd){
  if(!pAl)return;
  // Smooth lane offset
  var tgt=pLn*LW;
  curLO=lp(curLO,tgt,LS*dt);
  // Jump
  if(pJ){pVY-=GR*dt;if(pl.position.y+pVY*dt<=GY){pl.position.y=GY;pJ=false;pVY=0}else{pl.position.y+=pVY*dt}}
  // Slide
  if(pS){pST-=dt;if(pST<=0){pS=false;pST=0;pl.scale.y=1;pl.position.y=GY}}
  // Running animation — feet hitting ground
  pRT+=dt*spd*.14;
  if(!pS){
    var ph=pRT*2.8;
    var sn=Math.sin(ph),cs=Math.cos(ph),as=Math.abs(sn);

    // Whole body bounce on each footstep (only when grounded)
    if(!pJ) pl.position.y=GY+as*.05;

    // Body: forward lean + subtle side sway
    pBody.rotation.x=-.13;
    pBody.rotation.z=sn*.05;

    // Left foot: lift → swing forward → plant → push back
    var lL=Math.max(0,sn);
    ftL.position.y=-.02+lL*.25;
    ftL.position.z=.06+cs*.22;
    ftL.rotation.x=-sn*.35;

    // Right foot: opposite phase
    var rL=Math.max(0,-sn);
    ftR.position.y=-.02+rL*.25;
    ftR.position.z=.06-cs*.22;
    ftR.rotation.x=sn*.35;

    // Flippers pump forward/back like arms
    fL.rotation.x=sn*.55;
    fL.rotation.z=.12+as*.2;
    fR.rotation.x=-sn*.55;
    fR.rotation.z=-.12-as*.2;
  }else{
    // Reset pose during slide
    pBody.rotation.x=0;pBody.rotation.z=0;
    ftL.position.y=-.02;ftL.rotation.x=0;
    ftR.position.y=-.02;ftR.rotation.x=0;
    fL.rotation.x=0;fL.rotation.z=0;
    fR.rotation.x=0;fR.rotation.z=0;
  }
  // Eyes bounce with steps
  var eb=Math.abs(Math.sin(pRT*2.8))*.03;
  elW.position.y=1.15+eb;erW.position.y=1.15+eb;elP.position.y=1.14+eb;erP.position.y=1.14+eb;
}

function mkBuildings(g,side){

      for(var ci=0;ci<cnt;ci++){
        var th=rF(3,7),tr=rF(.7,1.5);
        var tx=bx+side*rF(.5,2.5),tz=z+ci*rF(2,3.5);
        var tk=new THREE.Mesh(new THREE.CylinderGeometry(.08,.12,1.2,5),trunkM);

      hill.position.set(bx+side*hr*.4,0,z+hr);hill.receiveShadow=true;g.add(hill);

      });

      topArch.position.set(bx+side*1.5,archH,z+3);topArch.rotation.y=Math.PI/2;g.add(topArch);

function mkTurnJunction(g,tt){
  // Corner road surface (smooth curve connection)
  var dir=tt==='left'?1:-1;
  var corner=new THREE.Mesh(new THREE.PlaneGeometry(RW,RW),mr);
  corner.rotation.x=-Math.PI/2;corner.position.set(dir*RW/2,.008,SL+RW/2);corner.receiveShadow=true;g.add(corner);

  // Side opening — road extending sideways
  var sideRoad=new THREE.Mesh(new THREE.PlaneGeometry(SL*.4,RW),mr);
  sideRoad.rotation.x=-Math.PI/2;
  sideRoad.position.set(dir*(RW/2+SL*.2),.006,SL+RW/2);sideRoad.receiveShadow=true;g.add(sideRoad);

  // Ice arch decoration at turn
  var archM=new THREE.MeshPhongMaterial({color:0x7ABED8,transparent:true,opacity:.5,shininess:120,specular:0xFFFFFF});
  var arch=new THREE.Mesh(new THREE.TorusGeometry(2.5,.15,6,12,Math.PI),archM);
  arch.position.set(dir*RW/2,2.5,SL+RW/2);
  arch.rotation.y=dir*HP;
  g.add(arch);

  // Decorative ice pillars at corner
  [-1,1].forEach(function(s){
    var pH=rF(3,5);
    var pillar=new THREE.Mesh(new THREE.CylinderGeometry(.18,.25,pH,6),mice);
    pillar.position.set(dir*(RW/2+s*RW*.4),pH/2,SL+RW/2+s*RW*.3);pillar.castShadow=true;g.add(pillar);
    var snowCap=new THREE.Mesh(new THREE.SphereGeometry(.32,5,4,0,P2,0,Math.PI/2),msnow);
    snowCap.position.set(pillar.position.x,pH,pillar.position.z);g.add(snowCap);
  });

  // Snow mounds at corner
  for(var i=0;i<3;i++){
    var sr=rF(.5,1.2);
    var sm=new THREE.Mesh(new THREE.SphereGeometry(sr,5,4,0,P2,0,Math.PI/2),msnow);
    sm.position.set(dir*(RW/2+rF(-1,RW*.3)),0,SL+RW/2+rF(-RW*.3,RW*.3));g.add(sm);
  }
}

function bldSeg(wx,wz,ang,tt){
  var g=new THREE.Group();
  g.position.set(wx,0,wz);
  g.rotation.y=-ang;

  mkRoadSurface(g);
  [-1,1].forEach(function(side){mkBuildings(g,side)});
  mkLights(g);

  if(tt) mkTurnJunction(g,tt);

  sc.add(g);
  return {wX:wx,wZ:wz,ang:ang,len:SL,tt:tt,g:g,proc:false};
}

var turnCool=0; // segments since last turn (prevent consecutive)
function genSeg(){
  var tt=null;
  if(sCnt>=5&&turnCool<=0){
    var r=Math.random();
    var turnChance=0.25+diff*0.15;
    if(r<turnChance) tt=Math.random()<0.5?'left':'right';
  }
  if(tt) turnCool=2; // require 2 straight segments after a turn
  else if(turnCool>0) turnCool--;
  // Track if previous segment had a turn (for safe zone)
  var afterTurn=segs.length>0&&segs[segs.length-1].tt?true:false;
  var s=bldSeg(nPWX,nPWZ,nPAng,tt);
  s.at=afterTurn;
  segs.push(s);

  var fx=fwX(nPAng),fz=fwZ(nPAng);
  nPWX+=fx*SL;nPWZ+=fz*SL;

  if(tt==='left') nPAng-=HP;
  else if(tt==='right') nPAng+=HP;

  sCnt++;
}

function initPath(){for(var i=0;i<NS;i++)genSeg()}

function cleanSegs(){
  while(curS>2){
    var old=segs.shift();sc.remove(old.g);
    old.g.traverse(function(c){if(c.geometry)c.geometry.dispose()});
    curS--;
  }
  var ac={};for(var i=0;i<segs.length;i++)ac[segs[i].g.id]=true;
  for(var i=obs.length-1;i>=0;i--)if(!ac[obs[i].sg.id])obs.splice(i,1);
  for(var i=coins.length-1;i>=0;i--)if(!ac[coins[i].sg.id])coins.splice(i,1);
  for(var i=pus.length-1;i>=0;i--)if(!ac[pus[i].sg.id])pus.splice(i,1);
}

function spawnObs(seg,d){
  var cnt=Math.floor(2+d*4),used=[];
  // Don't spawn in turn zone (last TZ units)
  var maxZ=seg.tt?SL-TZ-2:SL-3;
  // Safe zone after turn — give player reaction time
  var minZ=seg.at?22:4;
  // Minimum z-gap between obstacles that block different lanes (reaction time)
  var CROSS_GAP=8;
  for(var i=0;i<cnt;i++){
    var lane=rI(-1,1),zO=rF(minZ,maxZ),skip=false;
    // Same lane same z check
    for(var j=0;j<used.length;j++){if(Math.abs(used[j].z-zO)<5.5&&used[j].l===lane){skip=true;break}}
    if(skip)continue;
    // Max 2 obstacles at same z-depth
    var sZ=0;for(var j=0;j<used.length;j++){if(Math.abs(used[j].z-zO)<5.5)sZ++}
    if(sZ>=2)continue;
    // Cross-lane reachability: if nearby obstacles block other lanes,
    // ensure the open lane is reachable (enough z-gap to switch)
    var tooClose=false;
    for(var j=0;j<used.length;j++){
      var dz=Math.abs(used[j].z-zO);
      if(dz<CROSS_GAP&&dz>0.5&&used[j].l!==lane){
        // Check if adding this would leave no safe lane reachable
        var blocked={};blocked[lane]=true;blocked[used[j].l]=true;
        // Also check other obstacles near this z
        for(var k=0;k<used.length;k++){
          if(k!==j&&Math.abs(used[k].z-zO)<CROSS_GAP)blocked[used[k].l]=true;
        }
        // If all 3 lanes blocked within CROSS_GAP, reject
        if(blocked[-1]&&blocked[0]&&blocked[1]){tooClose=true;break}
      }
    }
    if(tooClose)continue;
    var types;if(d<.15)types=['car','barrier','cone'];else if(d<.4)types=['car','barrier','cone','low'];else types=['car','barrier','cone','low','overhead'];
    var t=rC(types),o=mkObs(t);o.position.set(lane*LW,0,zO);seg.g.add(o);
    obs.push({m:o,sg:seg.g});used.push({l:lane,z:zO});
  }
}

function chkObs(px,py,pz){
  for(var i=0;i<obs.length;i++){
    var o=obs[i];if(!o.m.parent)continue;
    o.m.getWorldPosition(oV);
    var dx=px-oV.x,dz=pz-oV.z;
    var dist2d=Math.sqrt(dx*dx+dz*dz);
    if(dist2d>4)continue;
    var cr=o.m.userData.cr||1;
    if(dist2d>cr+.4)continue;
    // Height check
    var gy=o.m.userData.gy||0;
    var sy=o.m.userData.sy||1;
    var pH=pS?.5:1.4;
    var pYmin=py-(pS?.2:0);
    var pYmax=py+pH;
    if(pYmax>gy+.1&&pYmin<gy+sy-.1) return o;
  }
  return null;
}

var $fs=document.getElementById('fs'),$fc=document.getElementById('fc'),$fd=document.getElementById('fd'),$fb=document.getElementById('fb');
var $nb=document.getElementById('nb'),$mb=document.getElementById('mbest'),$pup=document.getElementById('pup');

function uM(){$m.classList.remove('hide');$h.classList.remove('on');$g.classList.remove('on');$mb.textContent=best>0?'BEST: '+best:''}
function uP(){$m.classList.add('hide');$h.classList.add('on');$g.classList.remove('on')}
function uG(){$m.classList.add('hide');$h.classList.remove('on');$g.classList.add('on');$fs.textContent=sc2;$fc.textContent=cc;$fd.textContent=Math.floor(dst)+'m';$fb.textContent=best;$nb.style.display=isNB?'block':'none'}
function uH(){$sv.textContent=sc2;$cv.textContent=cc;$dv.textContent=Math.floor(dst)+'m'}
function uPP(){var h='';
  if(magOn)h+='<div class="pb">🧲 '+Math.ceil(magTm)+'s</div>';
  if(shiOn)h+='<div class="pb" style="border-color:#44FF88">🛡 '+Math.ceil(shiTm)+'s</div>';
  if(mulOn)h+='<div class="pb" style="border-color:#FF4488">×2 '+Math.ceil(mulTm)+'s</div>';
  if(bstOn)h+='<div class="pb" style="border-color:#FF8800">⚡ '+Math.ceil(bstTm)+'s</div>';
  if(frzOn)h+='<div class="pb" style="border-color:#88CCFF">❄️ '+Math.ceil(frzTm)+'s</div>';
  $pup.innerHTML=h;
}

function prNS(){
  for(var i=0;i<segs.length;i++){
    if(!segs[i].proc){
      segs[i].proc=true;
      if(i>=2) spawnObs(segs[i],diff); // Don't spawn on first 2 segments
      spawnC(segs[i]);
      spawnPU(segs[i]);
    }
  }
}

function start(){
  aInit();aRes();
  st='playing';sc2=0;cc=0;dst=0;spd=BS;isNB=false;diff=0;skI=0;skD=0;
  curS=0;sProg=0;pDir=0;nPWX=0;nPWZ=0;nPAng=0;sCnt=0;turnCool=0;
  pWX=0;pWZ=0;camRotY=0;camBoost=0;

  pReset();

  // Clean old segments
  for(var i=segs.length-1;i>=0;i--){sc.remove(segs[i].g);segs[i].g.traverse(function(c){if(c.geometry)c.geometry.dispose()})}
  segs.length=0;obs.length=0;coins.length=0;pus.length=0;
  magOn=shiOn=mulOn=bstOn=frzOn=false;magTm=shiTm=mulTm=bstTm=frzTm=0;
  shVis.visible=false;bstVis.material.opacity=0;
  sc.fog.color.setHex(FOG_COL);sc.background.setHex(FOG_COL);

  for(var i=pts.length-1;i>=0;i--){sc.remove(pts[i]);pts[i].geometry.dispose()}pts.length=0;

  initPath();prNS();iOn();uP();

  // Position player at start of first segment
  pl.position.set(0,GY,0);pl.rotation.y=0;
  cam.position.set(0,7,-10);camRotY=0;
}

function end(){
  st='gameover';sc2=Math.floor(dst+cc*15);
  if(sc2>best){best=sc2;isNB=true;localStorage.setItem('cityrun_best',String(best))}
  iOff();sCrash();skI=.35;skD=.35;cam.fov=60;cam.updateProjectionMatrix();
  setTimeout(uG,500);
}

$m.addEventListener('click',start);
$m.addEventListener('touchstart',function(e){e.preventDefault();start()},{passive:false});
document.getElementById('retry').addEventListener('click',start);
document.getElementById('menub').addEventListener('click',function(){st='menu';uM()});
document.getElementById('sound-btn').addEventListener('click',function(){muted=!muted;document.getElementById('sound-btn').textContent=muted?'🔇':'🔊'});
window.addEventListener('keydown',function(e){if(e.code==='Space'&&(st==='menu'||st==='gameover')){e.preventDefault();start()}});

// ── GAME LOOP ──
var clk=new THREE.Clock(),gameTime=0;

function anim(){
  requestAnimationFrame(anim);
  var dt=Math.min(clk.getDelta(),.05);gameTime+=dt;

  // Snowflakes always active
  upSnow(dt,pWX,pWZ);

  if(st==='playing'){
    var seg=segs[curS];
    if(!seg){end();return}

    // Input
    var a=iRd();

    // Effective speed (boost/freeze modifiers)
    var effSpd=spd;
    if(bstOn) effSpd*=1.5;
    if(frzOn) effSpd*=0.6;

    // Lane change (always available — turns are automatic)
    if(a.l&&pLn>-1){pLn--;sSwoosh()}
    if(a.r&&pLn<1){pLn++;sSwoosh()}

    // Jump / slide
    if(a.j&&!pJ){
      if(pS){pS=false;pST=0;pl.scale.y=1;pl.position.y=GY}
      pJ=true;pVY=JF;sJump();
    }
    if(a.s&&!pS&&!pJ){pS=true;pST=SD;pl.scale.y=.45;pl.position.y=GY*.45;sSlide()}

    // Advance along path
    sProg+=effSpd*dt;
    dst+=effSpd*dt;
    spd=Math.min(BS+(dst/100)*SI,MS);
    diff=Math.min(dst/1500,1);
    sc2=Math.floor(dst+cc*15);

    // Segment transition (auto-turn at boundaries)
    if(sProg>=seg.len){
      // Auto-execute turn if this segment has one
      if(seg.tt){
        if(seg.tt==='left') pDir-=HP;
        else pDir+=HP;
        curLO=0;
        sTurn();
        camBoost=1.0; // boost camera catch-up speed
      }
      curS++;
      sProg-=seg.len;

      // Ensure enough segments ahead
      while(segs.length-curS<NS) genSeg();

      // Clean old segments
      cleanSegs();

      // Process new segments
      prNS();
    }

    // Compute player world position
    if(curS<segs.length){
      var cs=segs[curS];
      var fx=fwX(pDir),fz=fwZ(pDir);
      var rx=riX(pDir),rz=riZ(pDir);
      pWX=cs.wX+fx*sProg+rx*curLO;
      pWZ=cs.wZ+fz*sProg+rz*curLO;

      // Update player mesh
      pl.position.x=pWX;
      pl.position.z=pWZ;
      // Smooth rotation
      var targetRotY=-pDir;
      var rotDiff=targetRotY-pl.rotation.y;
      while(rotDiff>Math.PI)rotDiff-=P2;
      while(rotDiff<-Math.PI)rotDiff+=P2;
      pl.rotation.y+=rotDiff*Math.min(8*dt,1);
    }

    // Animate character
    pAnimate(dt,effSpd);

    // Update collectibles
    upC(dt);
    upPU(dt);

    // Collision — obstacles
    if(pAl){
      var hit=chkObs(pWX,pl.position.y,pWZ);
      if(hit){
        if(bstOn){
          // Boost destroys obstacles
          hit.m.visible=false;
          var idx=obs.indexOf(hit);if(idx>=0)obs.splice(idx,1);
          spPt(new THREE.Vector3(pWX,pl.position.y+.5,pWZ),0xFF8844);
        }else if(shiOn){
          shiOn=false;shiTm=0;shVis.visible=false;sPU();
        }else{
          pAl=false;pDead=true;pDeadT=0;end();
        }
      }
    }

    // Collision — coins
    var co=colC(pWX,pl.position.y,pWZ,magOn);
    if(co>0){cc+=co*(mulOn?2:1);sCoin();spPt(pl.position.clone())}

    // Collision — powerups
    var pu=colPU(pWX,pl.position.y,pWZ);
    if(pu){
      if(pu==='mega'){cc+=50*(mulOn?2:1);sCoin();spPt(pl.position.clone(),0xFFDD00)}
      else sPU();
    }

    // Boost trail
    if(bstOn&&Math.random()>.4){spBoostTrail(pl.position,pDir)}

    // Speed FOV effect — widens at high speed for sense of motion
    var tgtFov=60+(effSpd-BS)/(MS-BS)*12; // 60° at base, up to 72° at max
    cam.fov=lp(cam.fov,tgtFov,2*dt);
    cam.updateProjectionMatrix();

    // UI
    uH();uPP();

    // Update directional light to follow player
    dL.position.set(pWX-6,16,pWZ+8);
    dL.target.position.set(pWX,0,pWZ);
    dL.target.updateMatrixWorld();
  }

  // Death animation
  if(pDead&&pDeadT<1.5) pDieAnim(dt);

  // Particles
  upPt(dt);

  // Camera follow (behind player, smooth rotation)
  if(st==='playing'||st==='gameover'){
    var fx2=fwX(pDir),fz2=fwZ(pDir);
    var camTX=pWX-fx2*10;
    var camTZ=pWZ-fz2*10;
    var camTY=7;

    var lookX=pWX+fx2*15;
    var lookZ=pWZ+fz2*15;
    var lookY=2.5;

    // Faster camera after turns, decays back to normal
    var camSpd=3.5+camBoost*12;
    if(camBoost>0) camBoost=Math.max(0,camBoost-dt*2.5);

    cam.position.x=lp(cam.position.x,camTX,camSpd*dt);
    cam.position.y=lp(cam.position.y,camTY,camSpd*dt);
    cam.position.z=lp(cam.position.z,camTZ,camSpd*dt);
    cam.lookAt(lookX,lookY,lookZ);
  }

  // Camera shake
  if(skD>0){skD-=dt;var s=skI*(skD/.35);cam.position.x+=(Math.random()-.5)*s;cam.position.y+=(Math.random()-.5)*s}

  // Move sky sphere + ground to follow player
  skyMsh.position.set(pWX,0,pWZ);
  gnd.position.set(pWX,-.06,pWZ);

  ren.render(sc,cam);
}

// ── INIT ──
// Add directional light target
dL.target=new THREE.Object3D();sc.add(dL.target);

uM();initPath();prNS();anim();

})()}catch(e){document.getElementById('err').style.display='flex';document.getElementById('err').textContent='Error: '+e.message+' | '+e.stack}
</script>
</body>
</html>
